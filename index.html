<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpeakUp · Recorder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  @keyframes eq { 0%, 100% { transform: scaleY(0.2); } 50% { transform: scaleY(1); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Inter, sans-serif; background: #16302E; color: #F4EFE6; }
  input, button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const COLORS = {
  bg: '#16302E', card: '#1F423F', text: '#F4EFE6', textMuted: '#9DBDB5',
  gold: '#E0A458', coral: '#E8674A', mint: '#7FCBAE', border: 'rgba(244,239,230,0.10)',
};

const PROMPTS = [
  "Describe a skill you'd like to learn this year and why.",
  "Talk about a memorable trip you've taken.",
  "Explain how you'd handle a disagreement with a coworker.",
  "Walk me through your morning routine.",
  "Talk about a book or podcast that changed how you think.",
  "Explain something from your job to someone outside your field.",
  "Describe a goal you're working toward right now.",
  "Talk about a time you solved a tricky problem at work.",
  "Explain why you chose your current career path.",
  "Describe your ideal weekend, from morning to night.",
];

const $ = (id) => document.getElementById(id);
const fmtTime = (s) => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
const fmtSize = (bytes) => bytes < 1024 * 1024 ? `${(bytes / 1024).toFixed(0)} KB` : `${(bytes / 1024 / 1024).toFixed(2)} MB`;

let mediaRecorder = null;
let chunks = [];
let stream = null;
let startTime = 0;
let timerInterval = null;
let recordedBlob = null;
let recordedUrl = null;
let promptIndex = Math.floor(Math.random() * PROMPTS.length);
let logLines = [];

function log(msg) {
  logLines.push(`${new Date().toLocaleTimeString()} ${msg}`);
  if (logLines.length > 25) logLines = logLines.slice(-25);
  const el = $('debug');
  if (el) { el.textContent = logLines.join('\n'); el.scrollTop = el.scrollHeight; }
}

function pickMimeType() {
  const candidates = [
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/mp4',
    'audio/ogg;codecs=opus',
    'audio/ogg',
  ];
  for (const t of candidates) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

async function startRecording() {
  try {
    log('requesting microphone...');
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
    });
    log('mic granted');
  } catch (e) {
    log('mic denied: ' + e.name);
    setError('Microphone access was denied. Allow it for this site and try again.');
    return;
  }

  const mimeType = pickMimeType();
  log('using mime: ' + (mimeType || 'browser default'));
  chunks = [];
  recordedBlob = null;

  try {
    mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
  } catch (e) {
    log('MediaRecorder init failed: ' + e.message);
    setError('This browser could not start audio recording.');
    cleanupStream();
    return;
  }

  mediaRecorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0) { chunks.push(e.data); }
  };
  mediaRecorder.onstop = () => {
    const type = mediaRecorder.mimeType || mimeType || 'audio/webm';
    recordedBlob = new Blob(chunks, { type });
    if (recordedUrl) URL.revokeObjectURL(recordedUrl);
    recordedUrl = URL.createObjectURL(recordedBlob);
    log(`stopped. blob: ${fmtSize(recordedBlob.size)}, type: ${type}`);
    cleanupStream();
    render();
  };
  mediaRecorder.onerror = (e) => {
    log('recorder error: ' + (e.error?.name || 'unknown'));
  };

  mediaRecorder.start(1000); // collect a chunk every second
  startTime = Date.now();
  setError('');
  log('recording started');
  timerInterval = setInterval(() => {
    const el = $('timer');
    if (el) el.textContent = fmtTime((Date.now() - startTime) / 1000);
  }, 200);
  render();
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function cleanupStream() {
  if (stream) { stream.getTracks().forEach((t) => t.stop()); stream = null; }
}

function discardRecording() {
  if (recordedUrl) { URL.revokeObjectURL(recordedUrl); recordedUrl = null; }
  recordedBlob = null;
  chunks = [];
  log('recording discarded');
  render();
}

function downloadRecording() {
  if (!recordedBlob) return;
  const ext = recordedBlob.type.includes('mp4') ? 'm4a' : recordedBlob.type.includes('ogg') ? 'ogg' : 'webm';
  const a = document.createElement('a');
  a.href = recordedUrl;
  a.download = `speakup-${Date.now()}.${ext}`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  log('download triggered (.' + ext + ')');
}

function newPrompt() {
  let n = Math.floor(Math.random() * PROMPTS.length);
  if (n === promptIndex) n = (n + 1) % PROMPTS.length;
  promptIndex = n;
  render();
}

let errorMsg = '';
function setError(msg) { errorMsg = msg; render(); }

const isRecording = () => mediaRecorder && mediaRecorder.state === 'recording';

function render() {
  const recording = isRecording();
  const hasRecording = !!recordedBlob;
  const recorderSupported = !!window.MediaRecorder && !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);

  const card = (inner, extra = '') => `<div style="background:${COLORS.card};border:1px solid ${COLORS.border};border-radius:18px;padding:20px;margin-bottom:16px;${extra}">${inner}</div>`;
  const eyebrow = (txt) => `<div style="font-family:'IBM Plex Mono';font-size:11px;letter-spacing:0.18em;color:${COLORS.textMuted};text-transform:uppercase;">${txt}</div>`;

  let html = `
  <div style="max-width:480px;margin:0 auto;padding:24px 20px 60px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
      <div>
        ${eyebrow('Audio recorder · phase 1')}
        <h1 style="font-family:Fraunces;font-weight:600;font-size:32px;margin:4px 0 0;">SpeakUp</h1>
      </div>
    </div>`;

  if (!recorderSupported) {
    html += card(`<div style="color:${COLORS.coral};font-size:14px;line-height:1.5;">Audio recording isn't supported in this browser. Open this page in Chrome on Android.</div>`, `border:1px solid ${COLORS.coral};`);
    html += `</div>`;
    $('root').innerHTML = html;
    return;
  }

  // prompt
  html += card(`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      ${eyebrow("Today's prompt")}
      <button onclick="newPrompt()" ${recording ? 'disabled' : ''} style="background:none;border:none;color:${recording ? COLORS.textMuted : COLORS.gold};cursor:${recording ? 'default' : 'pointer'};padding:0;font-size:13px;">↻ New</button>
    </div>
    <p style="font-family:Fraunces;font-weight:500;font-size:21px;line-height:1.4;margin:12px 0 0;">${PROMPTS[promptIndex]}</p>
  `);

  // recorder controls
  const bars = Array.from({ length: 9 }).map((_, i) =>
    `<div style="width:4px;height:32px;background:${recording ? COLORS.coral : 'rgba(244,239,230,0.2)'};border-radius:2px;transform-origin:bottom;${recording ? `animation:eq 0.${4 + (i % 4)}s ease-in-out infinite;animation-delay:${i * 0.05}s;` : 'transform:scaleY(0.25);'}"></div>`
  ).join('');

  const micButton = `
    <button onclick="${recording ? 'stopRecording()' : 'startRecording()'}" style="width:72px;height:72px;border-radius:50%;border:none;background:${recording ? COLORS.coral : COLORS.gold};display:flex;align-items:center;justify-content:center;cursor:pointer;">
      ${recording
        ? `<div style="width:24px;height:24px;background:${COLORS.bg};border-radius:4px;"></div>`
        : `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="${COLORS.bg}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`}
    </button>`;

  html += card(`
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      ${micButton}
      <div style="display:flex;align-items:center;gap:12px;">
        <span id="timer" style="font-family:'IBM Plex Mono';font-size:20px;color:${recording ? COLORS.coral : COLORS.textMuted};">00:00</span>
        <div style="display:flex;gap:4px;align-items:flex-end;height:32px;">${bars}</div>
      </div>
      <div style="font-size:13px;color:${COLORS.textMuted};text-align:center;">
        ${recording ? 'Recording — tap to stop' : hasRecording ? 'Tap to record again (replaces current)' : 'Tap to start recording'}
      </div>
    </div>
  `);

  if (errorMsg) {
    html += `<div style="background:rgba(232,103,74,0.12);border:1px solid ${COLORS.coral};border-radius:14px;padding:14px;margin-bottom:16px;font-size:13px;">${errorMsg}</div>`;
  }

  // playback + actions
  if (hasRecording && !recording) {
    html += card(`
      ${eyebrow('Your recording')}
      <audio controls src="${recordedUrl}" style="width:100%;margin:12px 0;"></audio>
      <div style="font-size:12px;color:${COLORS.textMuted};margin-bottom:14px;">Size: ${fmtSize(recordedBlob.size)} · Format: ${recordedBlob.type.split(';')[0]}</div>
      <div style="display:flex;gap:10px;">
        <button onclick="downloadRecording()" style="flex:1;background:${COLORS.gold};color:${COLORS.bg};border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;">Download</button>
        <button onclick="discardRecording()" style="background:none;border:1px solid ${COLORS.border};color:${COLORS.text};border-radius:12px;padding:13px 18px;font-size:14px;cursor:pointer;">Discard</button>
      </div>
    `);
  }

  // debug
  html += card(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      ${eyebrow('Debug log')}
      <button onclick="navigator.clipboard && navigator.clipboard.writeText(document.getElementById('debug').textContent)" style="background:none;border:1px solid ${COLORS.border};border-radius:8px;padding:4px 10px;color:${COLORS.textMuted};cursor:pointer;font-size:11px;">Copy</button>
    </div>
    <div id="debug" style="font-family:'IBM Plex Mono';font-size:11px;line-height:1.6;color:${COLORS.textMuted};max-height:160px;overflow-y:auto;white-space:pre-wrap;">${logLines.length ? logLines.join('\n') : 'Tap the mic to start...'}</div>
  `);

  html += `</div>`;
  $('root').innerHTML = html;
}

render();
log('ready. recorder supported: ' + (!!window.MediaRecorder));
</script>
</body>
</html>
